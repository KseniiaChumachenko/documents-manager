name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
      migrations: ${{ steps.filter.outputs.migrations }}
      env-name: ${{ steps.env.outputs.name }}
      env-branch: ${{ steps.env.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'packages/infra/**'
            app:
              - 'apps/web/app/**'
              - 'apps/web/components/**'
              - 'apps/web/lib/**'
              - 'apps/web/database/schema.ts'
              - 'apps/web/vite.config.ts'
              - 'apps/web/react-router.config.ts'
              - 'apps/web/wrangler.jsonc'
              - 'apps/web/package.json'
              - 'package.json'
              - 'package-lock.json'
            migrations:
              - 'apps/web/database/migrations/**'

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "name=staging" >> $GITHUB_OUTPUT
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "name=production" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

  infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.changes.outputs.env-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.env-branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Pulumi
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Pulumi Apply
        working-directory: packages/infra
        run: pulumi up --stack ${{ needs.changes.outputs.env-name }} --yes
        env:
          PULUMI_BACKEND_URL: file://./state

      - name: Commit Pulumi state
        if: always()
        env:
          HUSKY: 0
        run: |
          cd packages/infra
          if [[ -n $(git status --porcelain state/) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/ Pulumi.${{ needs.changes.outputs.env-name }}.yaml
            git commit -m "chore: update Pulumi ${{ needs.changes.outputs.env-name }} state [skip ci]"
            git push origin ${{ needs.changes.outputs.env-branch }}
          fi

  app:
    needs: [changes, infra]
    if: |
      always() &&
      needs.changes.outputs.app == 'true' &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ needs.changes.outputs.env-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.env-branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate types
        working-directory: apps/web
        run: npx react-router typegen

      - name: Build Worker
        working-directory: apps/web
        run: npm run build:${{ needs.changes.outputs.env-name }}

      - name: Deploy Worker
        working-directory: apps/web
        run: npx wrangler deploy

      - name: Deployment URL
        run: |
          if [[ "${{ needs.changes.outputs.env-name }}" == "staging" ]]; then
            echo "::notice::Deployed to https://staging.aeroclime.com"
          else
            echo "::notice::Deployed to https://app.aeroclime.com"
          fi

  migrations:
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.changes.outputs.env-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changes.outputs.env-branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Migrations
        working-directory: apps/web
        run: npx wrangler d1 migrations apply DB --remote --env ${{ needs.changes.outputs.env-name }}
