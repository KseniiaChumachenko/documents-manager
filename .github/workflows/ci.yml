name: CI

on:
  pull_request:
    branches: ['*']

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      typecheck: ${{ steps.filter.outputs.typecheck }}
      test: ${{ steps.filter.outputs.test }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lint:
              - 'apps/web/app/**'
              - 'apps/web/components/**'
              - 'apps/web/lib/**'
              - 'apps/web/database/schema.ts'
              - 'packages/infra/**/*.ts'
              - '.github/**'
              - 'package.json'
              - 'package-lock.json'
              - 'apps/web/package.json'
            typecheck:
              - 'apps/web/**'
              - 'packages/infra/**/*.ts'
              - '.github/**'
              - 'package.json'
              - 'package-lock.json'
              - 'apps/web/package.json'
              - 'tsconfig*.json'
            test:
              - 'apps/web/app/**'
              - 'apps/web/components/**'
              - 'apps/web/lib/**'
              - 'apps/web/database/**'
              - 'apps/web/e2e/**'
              - '.github/**'
              - 'package.json'
              - 'package-lock.json'
              - 'apps/web/package.json'

  lint:
    needs: changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    needs: changes
    if: needs.changes.outputs.typecheck == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Wrangler types
        working-directory: apps/web
        run: npx wrangler types --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run TypeScript check
        working-directory: apps/web
        run: npm run typecheck

  test:
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/web
        run: npm run test:e2e
        env:
          VITE_LOCAL: 'true'
