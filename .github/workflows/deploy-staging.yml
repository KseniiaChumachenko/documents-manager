name: Deploy Staging

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
  CLOUDFLARE_ENV: staging

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Pulumi
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Pulumi Preview & Apply
        working-directory: packages/infra
        run: pulumi up --stack staging --yes
        env:
          PULUMI_BACKEND_URL: file://./state

      - name: Generate types
        working-directory: apps/web
        run: npx react-router typegen

      - name: Build Worker
        working-directory: apps/web
        run: npm run build:staging

      - name: Deploy Worker
        working-directory: apps/web
        run: npx wrangler deploy

      - name: Run Migrations
        working-directory: apps/web
        run: npx wrangler d1 migrations apply DB --remote --env staging

      - name: Commit Pulumi state
        if: always()
        env:
          HUSKY: 0
        run: |
          cd packages/infra
          if [[ -n $(git status --porcelain state/) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/ Pulumi.staging.yaml
            git commit -m "chore: update Pulumi staging state [skip ci]"
            git push origin HEAD
          fi

      - name: Get Deployment URL
        run: echo "::notice::Deployed to https://staging.aeroclime.com"
