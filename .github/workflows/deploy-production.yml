name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Pulumi
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Pulumi Preview & Apply
        working-directory: packages/infra
        run: pulumi up --stack production --yes
        env:
          PULUMI_BACKEND_URL: file://./state

      - name: Build Worker
        working-directory: apps/web
        run: npm run build:production

      - name: Deploy Worker
        working-directory: apps/web
        run: npx wrangler deploy

      - name: Run Migrations
        working-directory: apps/web
        run: npx wrangler d1 migrations apply DB --remote --env production

      - name: Commit Pulumi state
        if: always()
        run: |
          cd packages/infra
          if [[ -n $(git status --porcelain state/) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/ Pulumi.production.yaml
            git commit -m "chore: update Pulumi production state [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Get Deployment URL
        run: echo "::notice::Deployed to https://app.aeroclime.com"
